<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges" width="16" height="16">
  <!-- Steam -->
  <rect x="7" y="0" width="1" height="1" fill="#b0c8a8"/>
  <rect x="9" y="0" width="1" height="1" fill="#b0c8a8"/>
  <rect x="6" y="1" width="1" height="1" fill="#b0c8a8"/>
  <rect x="10" y="1" width="1" height="1" fill="#b0c8a8"/>
  <!-- Valve -->
  <rect x="6" y="2" width="1" height="1" fill="#3a1808"/>
  <rect x="7" y="2" width="1" height="1" fill="#f0a030"/>
  <rect x="8" y="2" width="1" height="1" fill="#3a1808"/>
  <rect x="5" y="3" width="1" height="1" fill="#3a1808"/>
  <rect x="6" y="3" width="3" height="1" fill="#f0a030"/>
  <rect x="9" y="3" width="1" height="1" fill="#3a1808"/>
  <!-- Lid top -->
  <rect x="3" y="4" width="2" height="1" fill="#3a1808"/>
  <rect x="5" y="4" width="5" height="1" fill="#8a3c18"/>
  <rect x="10" y="4" width="2" height="1" fill="#3a1808"/>
  <!-- Lid mid -->
  <rect x="2" y="5" width="1" height="1" fill="#3a1808"/>
  <rect x="3" y="5" width="9" height="1" fill="#b05428"/>
  <rect x="12" y="5" width="1" height="1" fill="#3a1808"/>
  <!-- Lid bottom -->
  <rect x="1" y="6" width="1" height="1" fill="#3a1808"/>
  <rect x="2" y="6" width="11" height="1" fill="#b05428"/>
  <rect x="13" y="6" width="1" height="1" fill="#3a1808"/>
  <!-- Row 7: handles + body top with highlight -->
  <rect x="0" y="7" width="2" height="2" fill="#6a2808"/>
  <rect x="14" y="7" width="2" height="2" fill="#6a2808"/>
  <rect x="2" y="7" width="1" height="1" fill="#3a1808"/>
  <rect x="3" y="7" width="1" height="1" fill="#c06030"/>
  <rect x="4" y="7" width="1" height="1" fill="#d47840"/>
  <rect x="5" y="7" width="1" height="1" fill="#e89050"/>
  <rect x="6" y="7" width="7" height="1" fill="#c06030"/>
  <rect x="13" y="7" width="1" height="1" fill="#3a1808"/>
  <!-- Row 8 -->
  <rect x="2" y="8" width="1" height="1" fill="#3a1808"/>
  <rect x="3" y="8" width="1" height="1" fill="#c06030"/>
  <rect x="4" y="8" width="1" height="1" fill="#d47840"/>
  <rect x="5" y="8" width="8" height="1" fill="#c06030"/>
  <rect x="13" y="8" width="1" height="1" fill="#3a1808"/>
  <!-- Rows 9–12: body -->
  <rect x="2" y="9" width="1" height="4" fill="#3a1808"/>
  <rect x="3" y="9" width="10" height="4" fill="#c06030"/>
  <rect x="13" y="9" width="1" height="4" fill="#3a1808"/>
  <!-- Row 13: body taper -->
  <rect x="2" y="13" width="2" height="1" fill="#3a1808"/>
  <rect x="4" y="13" width="8" height="1" fill="#c06030"/>
  <rect x="12" y="13" width="2" height="1" fill="#3a1808"/>
  <!-- Row 14: base -->
  <rect x="3" y="14" width="10" height="1" fill="#3a1808"/>
</svg>
